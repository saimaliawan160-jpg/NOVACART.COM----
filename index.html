<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoShop - Shop Smarter, Live Better</title>
<meta name="description" content="NeoShop - Smart Gadgets, Fashion, Beauty, Kitchen & Home Decor at the best prices in Pakistan.">
<style>
  :root{
    --green:#10b981; --cyan:#06b6d4; --dark:#111827; --gray:#6b7280; --lightbg:#f9fafb; --border:#e5e7eb;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:var(--lightbg); color:var(--dark);}
  a{text-decoration:none; color:inherit;}
  img{max-width:100%; display:block;}
  .container{max-width:1200px; margin:0 auto; padding:0 16px;}

  /* HEADER */
  header{position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.97); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);}
  .topbar{display:flex; align-items:center; gap:16px; padding:12px 16px; max-width:1200px; margin:0 auto;}
  .logo{display:flex; align-items:center; gap:8px; font-weight:800; font-size:18px; cursor:pointer; flex-shrink:0;}
  .logo-icon{width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--green),var(--cyan)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold;}
  .searchbar{flex:1; display:flex; align-items:center; background:#f1f3f5; border-radius:999px; padding:8px 16px; gap:8px;}
  .searchbar input{border:none; background:transparent; outline:none; font-size:14px; width:100%;}
  .track-btn{font-size:14px; font-weight:600; color:var(--gray); white-space:nowrap; cursor:pointer; display:flex; align-items:center; gap:4px;}
  .track-btn:hover{color:var(--green);}
  .cart-btn{position:relative; cursor:pointer; font-size:22px;}
  .cart-badge{position:absolute; top:-6px; right:-8px; background:var(--green); color:#fff; font-size:10px; font-weight:bold; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .catstrip{display:flex; gap:8px; overflow-x:auto; padding:0 16px 10px; max-width:1200px; margin:0 auto;}
  .catstrip::-webkit-scrollbar{display:none;}
  .cat-chip{font-size:12px; font-weight:600; padding:7px 14px; border-radius:999px; background:#f1f3f5; color:var(--gray); white-space:nowrap; cursor:pointer; border:none;}
  .cat-chip.active{background:var(--green); color:#fff;}

  /* HERO */
  .hero{position:relative; border-radius:24px; overflow:hidden; margin:24px 16px; background:linear-gradient(120deg,#059669,#0891b2,#10b981); color:#fff; max-width:1168px; margin-left:auto; margin-right:auto;}
  .hero-inner{padding:60px 32px; max-width:480px; position:relative; z-index:2;}
  .hero p.tag{color:#d1fae5; font-weight:600; margin-bottom:8px; letter-spacing:0.5px; font-size:13px;}
  .hero h1{font-size:36px; font-weight:800; line-height:1.2; margin-bottom:14px;}
  .hero p.desc{color:#ecfdf5; margin-bottom:20px; font-size:15px;}
  .hero-btn{background:#fff; color:var(--green); font-weight:700; padding:12px 26px; border-radius:999px; border:none; cursor:pointer; font-size:14px;}

  /* TOAST */
  .toast{position:fixed; top:80px; right:16px; background:#111827; color:#fff; font-size:14px; padding:10px 18px; border-radius:12px; z-index:200; box-shadow:0 6px 16px rgba(0,0,0,.2);}

  /* PRODUCT GRID */
  .section-title{display:flex; justify-content:space-between; align-items:center; margin:28px 0 16px;}
  .section-title h2{font-size:20px; font-weight:800;}
  .section-title span{font-size:13px; color:var(--gray);}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px; padding-bottom:60px;}
  @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr);}}
  .card{background:#fff; border:1px solid #f1f3f5; border-radius:18px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); transition:transform .2s, box-shadow .2s; display:flex; flex-direction:column; cursor:pointer;}
  .card:hover{transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,.08);}
  .card-img{position:relative; aspect-ratio:1/1; background:#f3f4f6; overflow:hidden;}
  .card-img img{width:100%; height:100%; object-fit:cover;}
  .badge-off{position:absolute; top:10px; left:10px; background:var(--green); color:#fff; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px;}
  .card-body{padding:12px; display:flex; flex-direction:column; gap:5px; flex:1;}
  .card-cat{font-size:11px; color:var(--cyan); font-weight:600;}
  .card-name{font-size:13px; font-weight:600; line-height:1.3; min-height:34px;}
  .stars{display:flex; gap:1px; align-items:center;}
  .star{color:#d1d5db; font-size:13px;}
  .star.filled{color:#fbbf24;}
  .rcount{font-size:11px; color:#9ca3af;}
  .price-row{display:flex; align-items:baseline; gap:8px; margin-top:2px;}
  .price{font-size:16px; font-weight:800;}
  .price-old{font-size:12px; color:#9ca3af; text-decoration:line-through;}
  .add-btn{margin-top:6px; width:100%; background:linear-gradient(90deg,var(--green),var(--cyan)); color:#fff; border:none; padding:9px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer;}
  .add-btn:hover{opacity:.9;}

  /* PRODUCT DETAIL */
  .back-link{display:flex; align-items:center; gap:4px; color:var(--gray); font-size:14px; margin:18px 0; cursor:pointer; font-weight:600;}
  .pd-grid{display:grid; grid-template-columns:1fr; gap:28px; margin-bottom:40px;}
  @media(min-width:768px){.pd-grid{grid-template-columns:1fr 1fr;}}
  .pd-main-img{aspect-ratio:1/1; border-radius:18px; overflow:hidden; background:#f3f4f6; margin-bottom:10px;}
  .pd-main-img img{width:100%; height:100%; object-fit:cover;}
  .pd-thumbs{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .pd-thumbs div{aspect-ratio:1/1; border-radius:10px; overflow:hidden; background:#f3f4f6;}
  .pd-cat{color:var(--cyan); font-weight:600; font-size:13px; margin-bottom:4px;}
  .pd-title{font-size:24px; font-weight:800; margin-bottom:8px;}
  .pd-rating{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .pd-price-row{display:flex; align-items:baseline; gap:12px; margin-bottom:16px;}
  .pd-price{font-size:28px; font-weight:800;}
  .pd-off{color:var(--green); font-weight:700; font-size:14px;}
  .pd-desc{color:#4b5563; line-height:1.6; margin-bottom:24px;}
  .pd-addbtn{background:linear-gradient(90deg,var(--green),var(--cyan)); color:#fff; border:none; padding:13px 30px; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer;}
  .review-card{background:#fff; border:1px solid #f1f3f5; border-radius:14px; padding:14px; margin-bottom:10px;}
  .review-top{display:flex; justify-content:space-between; margin-bottom:4px;}
  .review-name{font-weight:600; font-size:13px;}
  .review-text{font-size:13px; color:#4b5563;}

  /* CART DRAWER */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:90; display:none;}
  .overlay.show{display:block;}
  .drawer{position:fixed; top:0; right:0; height:100%; width:100%; max-width:380px; background:#fff; z-index:91; transform:translateX(100%); transition:transform .25s; display:flex; flex-direction:column;}
  .drawer.show{transform:translateX(0);}
  .drawer-head{display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid var(--border);}
  .drawer-body{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px;}
  .cart-item{display:flex; gap:10px;}
  .cart-item img{width:64px; height:64px; border-radius:10px; object-fit:cover;}
  .cart-item-name{font-size:13px; font-weight:600;}
  .cart-item-price{font-size:13px; color:var(--gray);}
  .qty-row{display:flex; align-items:center; gap:8px; margin-top:4px;}
  .qty-btn{width:24px; height:24px; border-radius:6px; background:#f1f3f5; border:none; cursor:pointer; font-weight:bold;}
  .remove-link{font-size:11px; color:#ef4444; cursor:pointer; margin-left:8px;}
  .drawer-foot{padding:16px; border-top:1px solid var(--border);}
  .drawer-total{display:flex; justify-content:space-between; font-weight:800; margin-bottom:10px;}
  .checkout-btn{width:100%; background:linear-gradient(90deg,var(--green),var(--cyan)); color:#fff; border:none; padding:13px; border-radius:12px; font-weight:700; cursor:pointer;}

  /* CHECKOUT / TRACKING / CONFIRM PAGES */
  .page{max-width:760px; margin:0 auto; padding:32px 16px 60px;}
  .page h2{font-size:22px; font-weight:800; margin-bottom:20px;}
  .field{margin-bottom:14px;}
  .field label{font-size:13px; font-weight:600; display:block; margin-bottom:5px;}
  .field input{width:100%; border:1px solid var(--border); border-radius:12px; padding:11px 14px; font-size:14px; outline:none;}
  .field input:focus{border-color:var(--green);}
  .pay-option{display:flex; align-items:center; gap:8px; border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-bottom:8px; cursor:pointer; font-size:13px;}
  .pay-option.active{border-color:var(--green); background:#ecfdf5;}
  .pay-note{font-size:12px; color:var(--gray); margin:6px 0 14px;}
  .checkout-grid{display:grid; grid-template-columns:1fr; gap:24px;}
  @media(min-width:768px){.checkout-grid{grid-template-columns:2fr 1fr;}}
  .summary-box{background:#fff; border:1px solid var(--border); border-radius:14px; padding:16px; height:fit-content;}
  .summary-row{display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; color:#4b5563;}
  .summary-total{display:flex; justify-content:space-between; font-weight:800; border-top:1px solid var(--border); padding-top:10px; margin-top:6px;}
  .place-order-btn{width:100%; background:linear-gradient(90deg,var(--green),var(--cyan)); color:#fff; border:none; padding:14px; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}
  .track-row{display:flex; gap:8px; margin-bottom:16px;}
  .track-row input{flex:1; border:1px solid var(--border); border-radius:12px; padding:11px 14px; outline:none;}
  .track-btn-go{background:var(--green); color:#fff; border:none; padding:0 20px; border-radius:12px; font-weight:600; cursor:pointer;}
  .result-box{background:#fff; border:1px solid var(--border); border-radius:14px; padding:18px; margin-top:10px;}
  .confirm-page{text-align:center; padding:80px 16px;}
  .confirm-icon{font-size:54px; margin-bottom:10px;}
  .confirm-id{font-size:22px; font-weight:800; color:var(--green); margin-bottom:18px;}
  .continue-btn{background:#111827; color:#fff; border:none; padding:13px 28px; border-radius:12px; font-weight:600; cursor:pointer;}
  .empty-msg{text-align:center; color:#9ca3af; padding:40px 0;}
  footer{background:#111827; color:#9ca3af; text-align:center; padding:30px 16px; font-size:13px; margin-top:30px;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="logo" onclick="goHome()"><div class="logo-icon">N</div><span>NeoShop</span></div>
    <div class="searchbar">
      <span>🔍</span>
      <input id="searchInput" placeholder="Search products..." oninput="onSearch(this.value)">
    </div>
    <div class="track-btn" onclick="showView('tracking')">🚚 Track Order</div>
    <div class="cart-btn" onclick="openCart()">🛒<span class="cart-badge hidden" id="cartBadge">0</span></div>
  </div>
  <div class="catstrip" id="catStrip"></div>
</header>

<div class="toast hidden" id="toast"></div>
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head"><strong>Your Cart (<span id="drawerCount">0</span>)</strong><span style="cursor:pointer" onclick="closeCart()">✕</span></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</div>

<main class="container" id="mainContent"></main>

<footer>© 2026 NeoShop. Built for preview / demo purposes — replace placeholder images with your own before going live.</footer>

<script>
/* ===================== CONFIG ===================== */
const WHATSAPP_NUMBER = "923001234567"; // <-- replace with your real WhatsApp number, e.g. 923001234567
const BRAND = "NeoShop";
const DELIVERY_CHARGE = 300;

/* ===================== DATA ===================== */
const CATEGORIES = [

const REAL_IMAGES = {

  "Beaded Bracelet Set": ["/images/bracelet1.jpg","/images/bracelet2.jpg","/images/bracelet3.jpg"],

  "Statement Necklace": ["/images/necklace1.jpg","/images/necklace2.jpg","/images/necklace3.jpg"],
  "Canvas Tote Bag": ["/images/totebag1.jpg","/images/totebag2.jpg","/images/totebag3.jpg"],

};

const REVIEW_NAMES = ["Ayesha K.","Bilal M.","Sana R.","Hamza T.","Fatima S.","Usman A.","Zainab N.","Ahmed F.","Maria J.","Omar S."];
const REVIEW_TEXTS = [
  "Exactly as described, fast delivery and great quality!",
  "Really happy with this purchase, would recommend.",
  "Good value for the price. Packaging was solid.",
  "Took a few days but worth the wait. Works great.",
  "Quality exceeded my expectations, ordering again soon.",
  "Decent product, does what it says.",
  "My second order from here, never disappointed.",
  "Nice finish and feels premium for the price."
];

function seededRand(seed){ let x = Math.sin(seed) * 10000; return x - Math.floor(x); }

const PRODUCTS = [];
(function build(){
  let pid = 1;
  CATEGORIES.forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      const seed = ci * 100 + ii;
      const price = Math.round((300 + seededRand(seed) * 4500) / 10) * 10;
      const rating = parseFloat((3.6 + seededRand(seed + 5) * 1.4).toFixed(1));
      const reviewCount = Math.floor(8 + seededRand(seed + 9) * 180);
      const numReviews = 2 + Math.floor(seededRand(seed + 3) * 3);
      const reviews = Array.from({length:numReviews}, (_, ri) => ({
        name: REVIEW_NAMES[Math.floor(seededRand(seed+ri*7)*REVIEW_NAMES.length)],
        text: REVIEW_TEXTS[Math.floor(seededRand(seed+ri*11)*REVIEW_TEXTS.length)],
        stars: Math.max(3, Math.min(5, Math.round(3 + seededRand(seed+ri*13)*2)))
      }));
      const imgs = REAL_IMAGES[item] || [`https://picsum.photos/seed/neoshop${seed}/600/600`,`https://picsum.photos/seed/neoshop${seed}b/600/600`,`https://picsum.photos/seed/neoshop${seed}c/600/600`];
      PRODUCTS.push({
        id: pid++, name: item, category: cat.name, price,
        originalPrice: Math.round(price * 1.35), rating, reviewCount, reviews,
        img: imgs[0], img2: imgs[1] || imgs[0], img3: imgs[2] || imgs[0],
        description: `Premium quality ${item.toLowerCase()} designed for everyday use. Durable materials, modern design, and built to last. Perfect addition to your ${cat.name.toLowerCase()} collection.`
      });
    });
  });
})();

/* ===================== STATE ===================== */
let state = {
  view: "home", activeCategory: null, search: "", selectedProductId: null,
  cart: {}, // {productId: qty}
  orders: {}, // {orderId: order}
  form: { name:"", phone:"", address:"", city:"", payment:"COD" }
};

/* ===================== HELPERS ===================== */
function fmt(n){ return n.toLocaleString(); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.add('hidden'), 2000);
}
function starsHtml(rating, size){
  let h = '<div class="stars">';
  for(let i=1;i<=5;i++){ h += `<span class="star ${i<=Math.round(rating)?'filled':''}" style="font-size:${size||13}px">★</span>`; }
  h += '</div>';
  return h;
}
function cartCount(){ return Object.values(state.cart).reduce((a,b)=>a+b,0); }
function cartDetails(){
  return Object.entries(state.cart).map(([id,qty]) => ({ product: PRODUCTS.find(p=>p.id==id), qty })).filter(i=>i.product);
}
function cartSubtotal(){ return cartDetails().reduce((s,i)=>s+i.product.price*i.qty,0); }

/* ===================== ACTIONS ===================== */
function addToCart(id){
  state.cart[id] = (state.cart[id]||0)+1;
  const p = PRODUCTS.find(p=>p.id==id);
  showToast(`Added "${p.name}" to cart`);
  renderCartUI();
}
function updateQty(id, delta){
  state.cart[id] = (state.cart[id]||0)+delta;
  if(state.cart[id]<=0) delete state.cart[id];
  renderCartUI();
}
function removeFromCart(id){ delete state.cart[id]; renderCartUI(); }
function openCart(){ document.getElementById('overlay').classList.add('show'); document.getElementById('drawer').classList.add('show'); renderCartUI(); }
function closeCart(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('drawer').classList.remove('show'); }
function goHome(){ state.view='home'; state.activeCategory=null; state.search=''; document.getElementById('searchInput').value=''; render(); }
function showView(v){ state.view=v; render(); }
function openProduct(id){ state.selectedProductId=id; state.view='product'; render(); }
function setCategory(cat){ state.activeCategory=cat; state.view='home'; render(); }
function onSearch(val){ state.search=val; state.view='home'; state.activeCategory=null; render(); }

function placeOrder(){
  const f = state.form;
  if(!f.name || !f.phone || !f.address || !f.city){ showToast("Please fill all required fields"); return; }
  const items = cartDetails();
  if(items.length===0){ showToast("Your cart is empty"); return; }
  const subtotal = cartSubtotal();
  const total = subtotal + DELIVERY_CHARGE;
  const orderId = "NS" + Math.floor(100000 + Math.random()*900000);
  const order = { id: orderId, ...f, items: items.map(i=>({name:i.product.name, qty:i.qty, price:i.product.price})), subtotal, deliveryCharge: DELIVERY_CHARGE, total, status:"Processing", date: new Date().toLocaleString() };
  state.orders[orderId] = order;

  const productLines = order.items.map(i=>`- ${i.name} x${i.qty} (Rs ${fmt(i.price*i.qty)})`).join('\n');
  const message = `🛍️ *New Order Received - ${BRAND}*\n\n`+
    `*Order ID:* ${orderId}\n`+
    `*Name:* ${f.name}\n`+
    `*Phone:* ${f.phone}\n`+
    `*Address:* ${f.address}, ${f.city}\n`+
    `*Payment Method:* ${f.payment}\n\n`+
    `*Products:*\n${productLines}\n\n`+
    `*Subtotal:* Rs ${fmt(subtotal)}\n`+
    `*Delivery Charges:* Rs ${fmt(DELIVERY_CHARGE)}\n`+
    `*Total:* Rs ${fmt(total)}\n`+
    `*Status:* Pending`;

  const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
  window.open(waLink, "_blank");

  state.cart = {};
  state.lastOrderId = orderId;
  state.view = 'confirmed';
  render();
}

function trackOrder(){
  const id = document.getElementById('trackInput').value.trim();
  state.trackResult = state.orders[id] || (id ? 'not_found' : null);
  render();
}

/* ===================== RENDER ===================== */
function renderCatStrip(){
  const strip = document.getElementById('catStrip');
  let h = `<button class="cat-chip ${!state.activeCategory?'active':''}" onclick="setCategory(null)">All</button>`;
  CATEGORIES.forEach(c => {
    h += `<button class="cat-chip ${state.activeCategory===c.name?'active':''}" onclick="setCategory('${c.name}')">${c.emoji} ${c.name}</button>`;
  });
  strip.innerHTML = h;
}

function renderCartUI(){
  const count = cartCount();
  const badge = document.getElementById('cartBadge');
  if(count>0){ badge.textContent=count; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); }
  document.getElementById('drawerCount').textContent = count;

  const items = cartDetails();
  const body = document.getElementById('drawerBody');
  const foot = document.getElementById('drawerFoot');
  if(items.length===0){
    body.innerHTML = '<p class="empty-msg">Your cart is empty.</p>';
    foot.innerHTML = '';
    return;
  }
  body.innerHTML = items.map(i => `
    <div class="cart-item">
      <img src="${i.product.img}" onerror="this.style.background='#e5e7eb'">
      <div style="flex:1">
        <div class="cart-item-name">${i.product.name}</div>
        <div class="cart-item-price">Rs ${fmt(i.product.price)}</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="updateQty(${i.product.id},-1)">−</button>
          <span>${i.qty}</span>
          <button class="qty-btn" onclick="updateQty(${i.product.id},1)">+</button>
          <span class="remove-link" onclick="removeFromCart(${i.product.id})">Remove</span>
        </div>
      </div>
    </div>`).join('');
  const subtotal = cartSubtotal();
  foot.innerHTML = `
    <div class="drawer-total"><span>Subtotal</span><span>Rs ${fmt(subtotal)}</span></div>
    <button class="checkout-btn" onclick="closeCart(); showView('checkout')">Checkout</button>`;
}

function productCard(p){
  return `
    <div class="card" onclick="openProduct(${p.id})">
      <div class="card-img">
        <img src="${p.img}" onerror="this.parentElement.style.background='#e5e7eb'; this.style.display='none'">
        <span class="badge-off">${Math.round((1-p.price/p.originalPrice)*100)}% OFF</span>
      </div>
      <div class="card-body">
        <div class="card-cat">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div style="display:flex;align-items:center;gap:5px;">${starsHtml(p.rating)}<span class="rcount">(${p.reviewCount})</span></div>
        <div class="price-row"><span class="price">Rs ${fmt(p.price)}</span><span class="price-old">Rs ${fmt(p.originalPrice)}</span></div>
        <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">🛒 Add to Cart</button>
      </div>
    </div>`;
}

function filteredProducts(){
  let list = PRODUCTS;
  if(state.activeCategory) list = list.filter(p=>p.category===state.activeCategory);
  if(state.search.trim()) list = list.filter(p=>p.name.toLowerCase().includes(state.search.toLowerCase()));
  return list;
}

function renderHome(){
  const list = filteredProducts();
  let h = '';
  if(!state.activeCategory && !state.search){
    h += `
    <div class="hero">
      <div class="hero-inner">
        <p class="tag">SUMMER COLLECTION 2026</p>
        <h1>Shop Smarter.<br>Live Better.</h1>
        <p class="desc">Premium gadgets, fashion, beauty & home essentials — delivered to your door.</p>
        <button class="hero-btn" onclick="document.getElementById('grid').scrollIntoView({behavior:'smooth'})">Shop Now</button>
      </div>
    </div>`;
  }
  h += `<div class="section-title" id="grid"><h2>${state.search? `Results for "${state.search}"` : (state.activeCategory || 'Featured Products')}</h2><span>${list.length} items</span></div>`;
  h += `<div class="grid">${list.map(productCard).join('') || '<p class="empty-msg">No products found.</p>'}</div>`;
  return h;
}

function renderProductPage(){
  const p = PRODUCTS.find(p=>p.id===state.selectedProductId);
  if(!p) return '<p class="empty-msg">Product not found.</p>';
  const off = Math.round((1-p.price/p.originalPrice)*100);
  return `
    <div class="back-link" onclick="goHome()">‹ Back to shop</div>
    <div class="pd-grid">
      <div>
        <div class="pd-main-img"><img src="${p.img}" onerror="this.parentElement.style.background='#e5e7eb'"></div>
        <div class="pd-thumbs">
          <div><img src="${p.img}" onerror="this.style.display='none'"></div>
          <div><img src="${p.img2}" onerror="this.style.display='none'"></div>
          <div><img src="${p.img3}" onerror="this.style.display='none'"></div>
        </div>
      </div>
      <div>
        <div class="pd-cat">${p.category}</div>
        <div class="pd-title">${p.name}</div>
        <div class="pd-rating">${starsHtml(p.rating,16)}<span class="rcount">${p.rating} (${p.reviewCount} reviews)</span></div>
        <div class="pd-price-row"><span class="pd-price">Rs ${fmt(p.price)}</span><span class="price-old">Rs ${fmt(p.originalPrice)}</span><span class="pd-off">${off}% off</span></div>
        <p class="pd-desc">${p.description}</p>
        <button class="pd-addbtn" onclick="addToCart(${p.id})">🛒 Add to Cart</button>
        <div style="margin-top:36px;">
          <h3 style="margin-bottom:14px;font-weight:800;">Customer Reviews</h3>
          ${p.reviews.map(r=>`
            <div class="review-card">
              <div class="review-top"><span class="review-name">${r.name}</span>${starsHtml(r.stars,12)}</div>
              <div class="review-text">${r.text}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function renderCheckout(){
  const items = cartDetails();
  const subtotal = cartSubtotal();
  const total = subtotal + DELIVERY_CHARGE;
  const f = state.form;
  const paymentNotes = {
    "Easypaisa": "Send payment to Easypaisa: 03XX-XXXXXXX (NeoShop Official). Share screenshot on WhatsApp after ordering.",
    "JazzCash": "Send payment to JazzCash: 03XX-XXXXXXX (NeoShop Official). Share screenshot on WhatsApp after ordering.",
    "Bank Transfer": "Bank: Meezan Bank • Account Title: NeoShop • Account No: XXXX-XXXXXXX-XXX"
  };
  return `
    <div class="page">
      <div class="back-link" onclick="goHome()">‹ Back to shop</div>
      <h2>Checkout</h2>
      <div class="checkout-grid">
        <div>
          <div class="field"><label>Full Name *</label><input id="f_name" value="${f.name}" oninput="state.form.name=this.value"></div>
          <div class="field"><label>Phone Number *</label><input id="f_phone" placeholder="03XXXXXXXXX" value="${f.phone}" oninput="state.form.phone=this.value"></div>
          <div class="field"><label>Address *</label><input id="f_address" value="${f.address}" oninput="state.form.address=this.value"></div>
          <div class="field"><label>City *</label><input id="f_city" value="${f.city}" oninput="state.form.city=this.value"></div>
          <div class="field">
            <label>Payment Method</label>
            ${["COD","Easypaisa","JazzCash","Bank Transfer"].map(m=>`
              <div class="pay-option ${f.payment===m?'active':''}" onclick="state.form.payment='${m}'; render();">
                <input type="radio" ${f.payment===m?'checked':''} readonly> ${m==="COD"?"Cash on Delivery":m}
              </div>`).join('')}
            ${paymentNotes[f.payment] ? `<p class="pay-note">${paymentNotes[f.payment]}</p>` : ''}
          </div>
          <button class="place-order-btn" onclick="placeOrder()">💬 Place Order via WhatsApp</button>
        </div>
        <div class="summary-box">
          <h3 style="margin-bottom:12px;font-weight:700;">Order Summary</h3>
          ${items.map(i=>`<div class="summary-row"><span>${i.product.name} x${i.qty}</span><span>Rs ${fmt(i.product.price*i.qty)}</span></div>`).join('')}
          <div class="summary-row"><span>Subtotal</span><span>Rs ${fmt(subtotal)}</span></div>
          <div class="summary-row"><span>Delivery Charges</span><span>Rs ${fmt(DELIVERY_CHARGE)}</span></div>
          <div class="summary-total"><span>Total</span><span>Rs ${fmt(total)}</span></div>
        </div>
      </div>
    </div>`;
}

function renderTracking(){
  const r = state.trackResult;
  let resultHtml = '';
  if(r === 'not_found'){
    resultHtml = '<p style="color:#ef4444;font-size:13px;margin-top:10px;">No order found with that ID (orders only persist for this browser session in this demo).</p>';
  } else if(r){
    resultHtml = `
      <div class="result-box">
        <p style="font-weight:700;margin-bottom:4px;">Order ${r.id}</p>
        <p style="font-size:13px;color:var(--gray);margin-bottom:10px;">${r.date}</p>
        <div class="summary-row"><span>Subtotal</span><span>Rs ${fmt(r.subtotal)}</span></div>
        <div class="summary-row"><span>Delivery</span><span>Rs ${fmt(r.deliveryCharge)}</span></div>
        <div class="summary-total" style="margin-bottom:10px;"><span>Total</span><span>Rs ${fmt(r.total)}</span></div>
        <div style="color:var(--green);font-weight:600;font-size:14px;">✅ Status: ${r.status}</div>
      </div>`;
  }
  return `
    <div class="page" style="max-width:480px;">
      <div class="back-link" onclick="goHome()">‹ Back to shop</div>
      <h2>📦 Track Your Order</h2>
      <div class="track-row">
        <input id="trackInput" placeholder="Enter Order ID e.g. NS123456">
        <button class="track-btn-go" onclick="trackOrder()">Track</button>
      </div>
      ${resultHtml}
    </div>`;
}

function renderConfirmed(){
  const order = state.orders[state.lastOrderId];
  if(!order) { goHome(); return ''; }
  return `
    <div class="confirm-page">
      <div class="confirm-icon">✅</div>
      <h2 style="margin-bottom:6px;">Order Placed!</h2>
      <p style="color:var(--gray);margin-bottom:4px;">Your order ID is</p>
      <p class="confirm-id">${order.id}</p>
      <p style="color:var(--gray);font-size:13px;margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto;">We've opened WhatsApp with your order details ready to send. If it didn't open, allow popups and try again.</p>
      <button class="continue-btn" onclick="goHome()">Continue Shopping</button>
    </div>`;
}

function render(){
  renderCatStrip();
  const main = document.getElementById('mainContent');
  if(state.view === 'home') main.innerHTML = renderHome();
  else if(state.view === 'product') main.innerHTML = renderProductPage();
  else if(state.view === 'checkout') main.innerHTML = renderCheckout();
  else if(state.view === 'tracking') main.innerHTML = renderTracking();
  else if(state.view === 'confirmed') main.innerHTML = renderConfirmed();
  renderCartUI();
}

render();
</script>
</body>
</html>
